<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Orange background -->
  <rect width="1024" height="1024" fill="#F39521"/>

  <!--
    Layer 1: chunky black silhouette (hat outline + face hair)
    Drawn as one path so it stays one solid shape behind everything.
  -->
  <g fill="#000000">
    <!-- Hat silhouette (taller, with curled-up brim tips) + face hair below -->
    <path d="M 512 200
             C 360 200, 235 270, 215 380
             C 210 410, 222 435, 240 445
             C 195 460, 165 490, 165 535
             C 165 580, 200 600, 250 595
             C 245 615, 260 635, 290 642
             C 305 660, 340 658, 365 645
             L 370 640
             C 410 650, 460 655, 512 655
             L 654 645
             L 659 645
             C 684 658, 719 660, 734 642
             C 764 635, 779 615, 774 595
             C 824 600, 859 580, 859 535
             C 859 490, 829 460, 784 445
             C 802 435, 814 410, 809 380
             C 789 270, 664 200, 512 200 Z

             M 512 605
             C 410 605, 330 660, 320 740
             C 315 800, 350 870, 412 905
             C 444 925, 478 935, 512 935
             C 546 935, 580 925, 612 905
             C 674 870, 709 800, 704 740
             C 694 660, 614 605, 512 605 Z" />
  </g>

  <!-- Hat crown (brown) -->
  <path d="M 512 240
           C 380 240, 290 290, 280 380
           C 275 420, 295 460, 330 480
           L 694 480
           C 729 460, 749 420, 744 380
           C 734 290, 644 240, 512 240 Z"
        fill="#8B5A3C"/>

  <!-- Hat brim — wider than crown, with curled-up tips on both sides -->
  <path d="M 512 460
           C 380 460, 250 490, 230 540
           C 220 565, 240 588, 270 590
           C 290 595, 320 588, 345 575
           C 358 605, 378 615, 400 610
           C 420 605, 432 590, 432 575
           L 432 540
           L 592 540
           L 592 575
           C 592 590, 604 605, 624 610
           C 646 615, 666 605, 679 575
           C 704 588, 734 595, 754 590
           C 784 588, 804 565, 794 540
           C 774 490, 644 460, 512 460 Z"
        fill="#8B5A3C"/>

  <!-- Face (round, slightly darker orange than bg) -->
  <circle cx="512" cy="775" r="148" fill="#E66B2C"/>

  <!-- Eyes -->
  <ellipse cx="454" cy="755" rx="22" ry="28" fill="#000000"/>
  <ellipse cx="570" cy="755" rx="22" ry="28" fill="#000000"/>

  <!-- Smile -->
  <path d="M 460 815
           Q 512 855, 564 815
           Q 540 845, 512 845
           Q 484 845, 460 815 Z"
        fill="#000000"/>
</svg>
