name: Build desktop apps

# Builds GUI binaries for macOS and Windows. Attaches them to a GitHub Release
# when a tag like v0.1.0 is pushed, otherwise uploads as workflow artifacts so
# you can download them for testing.
#
# Triggers:
#   - push of a tag starting with 'v'  → builds + creates a Release
#   - workflow_dispatch                → manual build, artifacts only

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: ZohoVideoRenamer-macOS
            binary_name: ZohoVideoRenamer
          - os: windows-latest
            artifact_name: ZohoVideoRenamer-Windows
            binary_name: ZohoVideoRenamer.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[all]"

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # --collect-all tkinter pulls in tcl/tk runtime files that PyInstaller
          # otherwise misses, which is the usual cause of "app crashes immediately
          # on launch" for tkinter GUIs bundled on macOS.
          pyinstaller --noconfirm --windowed --onedir \
            --name ZohoVideoRenamer \
            --icon docs/assets/logo.icns \
            --osx-bundle-identifier com.princezoho.zohovideorenamer \
            --collect-all tkinter \
            --collect-all anthropic \
            --collect-all openai \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --hidden-import _tkinter \
            zoho_video_renamer/gui.py

          # Sanity check: app bundle was actually built and CLI runs
          ls -la dist/
          if [ -d dist/ZohoVideoRenamer.app ]; then
            echo "✓ .app bundle exists"
            # Run the bundled executable headlessly for ~2 seconds to surface import errors
            # (it will fail to open a window but should print import errors if any)
            timeout 3s "dist/ZohoVideoRenamer.app/Contents/MacOS/ZohoVideoRenamer" 2>&1 | head -40 || true
          fi

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name ZohoVideoRenamer `
            --icon docs/assets/favicon.ico `
            --collect-all tkinter `
            --collect-all anthropic `
            --collect-all openai `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            --hidden-import _tkinter `
            zoho_video_renamer/gui.py

      - name: Package macOS app into .dmg
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          if [ -d ZohoVideoRenamer.app ]; then
            # Strip the quarantine attribute so users don't get a Gatekeeper warning
            # when downloading the DMG. (Unsigned apps still trigger the warning on
            # first launch — see the landing page security note.)
            xattr -dr com.apple.quarantine ZohoVideoRenamer.app 2>/dev/null || true
            hdiutil create -volname "ZohoVideoRenamer" -srcfolder ZohoVideoRenamer.app -ov -format UDZO ZohoVideoRenamer.dmg
          else
            # onedir output: zip the folder
            cd ZohoVideoRenamer
            zip -r ../ZohoVideoRenamer-macOS.zip .
          fi

      - name: Package Windows .exe
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          if (Test-Path ZohoVideoRenamer.exe) {
            Compress-Archive -Path ZohoVideoRenamer.exe -DestinationPath ZohoVideoRenamer-Windows.zip
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
          generate_release_notes: true
