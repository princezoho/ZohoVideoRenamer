name: Build desktop apps

# Builds GUI binaries for macOS and Windows. Attaches them to a GitHub Release
# when a tag like v0.1.0 is pushed, otherwise uploads as workflow artifacts so
# you can download them for testing.
#
# Triggers:
#   - push of a tag starting with 'v'  → builds + creates a Release
#   - workflow_dispatch                → manual build, artifacts only

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon macOS (M1/M2/M3/M4 — covers 95%+ of Macs sold since 2020).
          # macos-13 Intel was dropped because the runners are scarce on the free tier
          # and were blocking releases for hours. Re-add via PR when there's real
          # demand for an Intel build.
          - os: macos-14
            artifact_name: ZohoVideoRenamer-macOS
            binary_name: ZohoVideoRenamer
            arch_suffix: ""
          - os: windows-latest
            artifact_name: ZohoVideoRenamer-Windows
            binary_name: ZohoVideoRenamer.exe
            arch_suffix: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[all]"

      - name: Build with PyInstaller (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          # Note: we build separately for Intel (macos-13) and Apple Silicon (macos-14)
          # rather than a universal2 binary, because Python on the runners is single-arch.
          ARCH=$(uname -m)
          echo "Building for arch: $ARCH"

          pyinstaller --noconfirm --windowed --onedir \
            --name ZohoVideoRenamer \
            --icon docs/assets/logo.icns \
            --osx-bundle-identifier com.princezoho.zohovideorenamer \
            --collect-all tkinter \
            --collect-all anthropic \
            --collect-all openai \
            --collect-all imageio_ffmpeg \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --hidden-import _tkinter \
            --collect-submodules zoho_video_renamer \
            launcher.py

          ls -la dist/
          if [ -d dist/ZohoVideoRenamer.app ]; then
            echo "✓ .app bundle exists, architecture:"
            file dist/ZohoVideoRenamer.app/Contents/MacOS/ZohoVideoRenamer
            # Smoke-run the bundled executable headlessly for ~3 seconds to surface
            # any import-time crash in the CI log.
            timeout 3s "dist/ZohoVideoRenamer.app/Contents/MacOS/ZohoVideoRenamer" 2>&1 | head -40 || echo "(timed out or exited — that may be normal if it opened a tkinter window)"
          fi

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name ZohoVideoRenamer `
            --icon docs/assets/favicon.ico `
            --collect-all tkinter `
            --collect-all anthropic `
            --collect-all openai `
            --collect-all imageio_ffmpeg `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            --hidden-import _tkinter `
            --collect-submodules zoho_video_renamer `
            launcher.py

      - name: Package macOS app into .dmg
        if: startsWith(matrix.os, 'macos')
        run: |
          cd dist
          if [ -d ZohoVideoRenamer.app ]; then
            xattr -dr com.apple.quarantine ZohoVideoRenamer.app 2>/dev/null || true
            # Suffix the filename with -Intel or -AppleSilicon so users can pick the right one
            DMG_NAME="ZohoVideoRenamer${{ matrix.arch_suffix }}.dmg"
            hdiutil create -volname "ZohoVideoRenamer" -srcfolder ZohoVideoRenamer.app -ov -format UDZO "$DMG_NAME"
            ls -la *.dmg
          fi

      - name: Package Windows .exe
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          if (Test-Path ZohoVideoRenamer.exe) {
            Compress-Archive -Path ZohoVideoRenamer.exe -DestinationPath ZohoVideoRenamer-Windows.zip
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
          generate_release_notes: true
